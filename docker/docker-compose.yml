name: hausordnung

services:
  db:
    image: mariadb:10.11
    container_name: hausordnung-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - /srv/docker/hausordnung/data/db:/var/lib/mysql
      - /srv/docker/hausordnung/data/initdb:/docker-entrypoint-initdb.d:ro

  app:
    image: php:8.3-apache
    container_name: hausordnung-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
      HO_TOKEN: ${HO_TOKEN}
      OPENWEATHER_API: ${OPENWEATHER_API}
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
    volumes:
      - /srv/docker/hausordnung/data/htdocs:/var/www/html
      - /srv/docker/hausordnung/data/php.ini:/usr/local/etc/php/php.ini
    command: >
      sh -c "docker-php-ext-install mysqli pdo_mysql && apache2-foreground"
    ports:
      - "${APP_PORT:-28830}:80"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: hausordnung-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
    ports:
      - "${PHPMYADMIN_PORT:-28831}:80"

  ftp:
    image: delfer/alpine-ftp-server:latest
    container_name: hausordnung-ftp
    restart: unless-stopped
    environment:
      USERS: "${FTP_USER}|${FTP_PASS}|/home/${FTP_USER}"
      ADDRESS: ${FTP_PUBLIC_HOST:-192.168.112.30}
      MIN_PORT: ${FTP_PASSIVE_MIN_PORT:-28833}
      MAX_PORT: ${FTP_PASSIVE_MAX_PORT:-28842}
    volumes:
      - /srv/docker/hausordnung/data/htdocs:/home/${FTP_USER}
    ports:
      - "${FTP_PORT:-28832}:21"
      - "${FTP_PASSIVE_MIN_PORT:-28833}-${FTP_PASSIVE_MAX_PORT:-28842}:${FTP_PASSIVE_MIN_PORT:-28833}-${FTP_PASSIVE_MAX_PORT:-28842}"
