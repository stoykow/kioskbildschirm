services:
  app:
    build: .
    ports:
      - "${APP_PORT:-28830}:80"
    environment:
      DB_HOST: db
      DB_NAME: hausordnung
      DB_USER: hausordnung
      DB_PASS: hausordnung
      OPENWEATHER_API: ${OPENWEATHER_API:-}
    depends_on:
      - db

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: hausordnung
      MARIADB_USER: hausordnung
      MARIADB_PASSWORD: hausordnung
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  db_data:
